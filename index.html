<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Bluetooth IMU Logger</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
      background: #f6f7f9;
      color: #1d1f23;
    }

    h1 {
      margin-bottom: 12px;
    }

    button {
      padding: 10px 14px;
      margin: 4px;
      border: 1px solid #999;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px;
      margin: 14px 0;
    }

    .live-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .value {
      padding: 10px;
      background: #f0f2f5;
      border-radius: 6px;
    }

    .label {
      font-size: 12px;
      color: #555;
    }

    .number {
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    th {
      background: #eceff3;
      position: sticky;
      top: 0;
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    #status {
      margin-top: 8px;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Web Bluetooth IMU Logger</h1>

  <div class="panel">
    <button id="connectBtn">Connect</button>
    <button id="startBtn" disabled>Start Logging</button>
    <button id="stopBtn" disabled>Stop Logging</button>
    <button id="downloadBtn" disabled>Download CSV</button>
    <div id="status">Disconnected</div>
  </div>

  <div class="panel">
    <h2>Live Sample</h2>
    <div class="live-grid">
      <div class="value">
        <div class="label">millis</div>
        <div class="number" id="millisVal">-</div>
      </div>
      <div class="value">
        <div class="label">counter</div>
        <div class="number" id="counterVal">-</div>
      </div>
      <div class="value">
        <div class="label">ax</div>
        <div class="number" id="axVal">-</div>
      </div>
      <div class="value">
        <div class="label">ay</div>
        <div class="number" id="ayVal">-</div>
      </div>
      <div class="value">
        <div class="label">az</div>
        <div class="number" id="azVal">-</div>
      </div>
      <div class="value">
        <div class="label">gx</div>
        <div class="number" id="gxVal">-</div>
      </div>
      <div class="value">
        <div class="label">gy</div>
        <div class="number" id="gyVal">-</div>
      </div>
      <div class="value">
        <div class="label">gz</div>
        <div class="number" id="gzVal">-</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>Logged Samples</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>millis</th>
            <th>ax</th>
            <th>ay</th>
            <th>az</th>
            <th>gx</th>
            <th>gy</th>
            <th>gz</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "7b3f0001-2d7a-4c1a-9b6e-4b5f0a000001";
    const IMU_CHAR_UUID = "7b3f0002-2d7a-4c1a-9b6e-4b5f0a000001";
    const PACKET_SIZE = 81;
    const MAGIC = 0x314D5549;

    let device = null;
    let server = null;
    let imuCharacteristic = null;
    let isLogging = false;
    let samples = [];

    const connectBtn = document.getElementById("connectBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const logBody = document.getElementById("logBody");

    const fields = {
      millis: document.getElementById("millisVal"),
      counter: document.getElementById("counterVal"),
      ax: document.getElementById("axVal"),
      ay: document.getElementById("ayVal"),
      az: document.getElementById("azVal"),
      gx: document.getElementById("gxVal"),
      gy: document.getElementById("gyVal"),
      gz: document.getElementById("gzVal")
    };

    connectBtn.addEventListener("click", connectBLE);
    startBtn.addEventListener("click", startLogging);
    stopBtn.addEventListener("click", stopLogging);
    downloadBtn.addEventListener("click", downloadCSV);

    async function connectBLE() {
      if (!navigator.bluetooth) {
        statusEl.textContent = "Web Bluetooth is not available in this browser.";
        return;
      }

      try {
        statusEl.textContent = "Requesting Bluetooth device...";

        device = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: "XIAO-ESP32C3-IMU" }],
          optionalServices: [SERVICE_UUID]
        });

        device.addEventListener("gattserverdisconnected", onDisconnected);

        statusEl.textContent = "Connecting...";
        server = await device.gatt.connect();

        const service = await server.getPrimaryService(SERVICE_UUID);
        imuCharacteristic = await service.getCharacteristic(IMU_CHAR_UUID);

        await imuCharacteristic.startNotifications();
        imuCharacteristic.addEventListener("characteristicvaluechanged", handleNotification);

        statusEl.textContent = `Connected to ${device.name}`;
        connectBtn.disabled = true;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      } catch (error) {
        statusEl.textContent = `Connection failed: ${error.message}`;
      }
    }

    function onDisconnected() {
      statusEl.textContent = "Disconnected";
      connectBtn.disabled = false;
      startBtn.disabled = true;
      stopBtn.disabled = true;
      isLogging = false;
    }

    function startLogging() {
      samples = [];
      logBody.innerHTML = "";
      isLogging = true;

      startBtn.disabled = true;
      stopBtn.disabled = false;
      downloadBtn.disabled = true;

      statusEl.textContent = "Logging...";
    }

    function stopLogging() {
      isLogging = false;

      startBtn.disabled = false;
      stopBtn.disabled = true;
      downloadBtn.disabled = samples.length === 0;

      statusEl.textContent = `Stopped. ${samples.length} samples logged.`;
    }

    function handleNotification(event) {
      const value = event.target.value;

      if (value.byteLength !== PACKET_SIZE) {
        console.warn(`Unexpected packet size: ${value.byteLength}`);
        return;
      }

      const sample = decodePacket(value);

      if (!sample) {
        return;
      }

      updateLiveDisplay(sample);

      if (isLogging) {
        samples.push(sample);
        appendTableRow(sample);
      }
    }

    function decodePacket(view) {
      const magic = view.getUint32(0, true);

      if (magic !== MAGIC) {
        console.warn("Bad packet magic:", magic.toString(16));
        return null;
      }

      return {
        counter: view.getUint32(4, true),
        millis: view.getUint32(8, true),
        ax: view.getInt16(12, true),
        ay: view.getInt16(14, true),
        az: view.getInt16(16, true),
        gx: view.getInt16(18, true),
        gy: view.getInt16(20, true),
        gz: view.getInt16(22, true),
        sampleRateHz: view.getUint8(24)
      };
    }

    function updateLiveDisplay(sample) {
      fields.millis.textContent = sample.millis;
      fields.counter.textContent = sample.counter;
      fields.ax.textContent = sample.ax;
      fields.ay.textContent = sample.ay;
      fields.az.textContent = sample.az;
      fields.gx.textContent = sample.gx;
      fields.gy.textContent = sample.gy;
      fields.gz.textContent = sample.gz;
    }

    function appendTableRow(sample) {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${sample.millis}</td>
        <td>${sample.ax}</td>
        <td>${sample.ay}</td>
        <td>${sample.az}</td>
        <td>${sample.gx}</td>
        <td>${sample.gy}</td>
        <td>${sample.gz}</td>
      `;

      logBody.appendChild(row);

      if (logBody.children.length > 1000) {
        logBody.removeChild(logBody.firstChild);
      }
    }

    function downloadCSV() {
      if (samples.length === 0) {
        return;
      }

      const lines = ["millis,ax,ay,az,gx,gy,gz"];

      for (const s of samples) {
        lines.push(`${s.millis},${s.ax},${s.ay},${s.az},${s.gx},${s.gy},${s.gz}`);
      }

      const blob = new Blob([lines.join("\n")], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = `imu_log_${Date.now()}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
